<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1410">
<title>Command Center · Capital of the Republic</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var t = localStorage.getItem('cc-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  var s = localStorage.getItem('cc-textSize');
  var bases = { low: '14px', med: '17px', high: '21px' };
  if (s && bases[s]) document.documentElement.style.setProperty('--fs-base', bases[s]);
})();
</script>
<noscript><p style="padding:2rem;text-align:center;font-family:sans-serif;">Command Center requires JavaScript.</p></noscript>
</head>
<body>

<a href="#roomContainer" class="cc-skip-link">Skip to content</a>

<header id="capitalHeader">
  <div class="cc-header-inner">
    <button data-action="goHome" class="cc-app-title-btn" aria-label="Capital Overview">
      <span class="cc-app-title">Command Center</span>
      <span class="cc-app-subtitle">Capital of the Republic</span>
    </button>
    <div class="cc-header-actions">
      <button data-action="openSettings" class="cc-btn-icon" aria-label="Settings">
        <svg class="cc-icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="18" x2="20" y2="18"></line>
          <circle cx="9" cy="6" r="2" fill="currentColor" stroke="none"></circle>
          <circle cx="15" cy="12" r="2" fill="currentColor" stroke="none"></circle>
          <circle cx="7" cy="18" r="2" fill="currentColor" stroke="none"></circle>
        </svg>
      </button>
    </div>
  </div>
</header>

<nav id="breadcrumbBar" class="cc-breadcrumb" hidden></nav>

<main id="roomContainer" class="cc-room-container">
  <!-- Rooms render here -->
</main>

<div id="toastContainer" class="cc-toast-container"></div>

<div id="overlayBackdrop" class="cc-overlay-backdrop" hidden></div>
<div id="overlayContainer" class="cc-overlay" hidden></div>

<footer id="capitalFooter" class="cc-footer">
  <span class="cc-footer-sig">Capital of the Republic of Codex</span>
  <span class="cc-footer-meta">
    <span class="cc-footer-stage">Foundation Stage</span>
    <span class="cc-footer-sep" aria-hidden="true">&middot;</span>
    <span id="ccVersionLabel">v0.1</span>
    <span class="cc-footer-sep" aria-hidden="true">&middot;</span>
    <span id="ccBuiltLabel">built 16 Apr 2026</span>
    <span class="cc-footer-sep" aria-hidden="true">&middot;</span>
    <span>Chronicled at Codex</span>
  </span>
</footer>

</body>
</html>
<style>
/* Command Center — Capital of the Republic
   Stylesheet · Foundation Stage v0.1
   Fonts: Playfair Display + Work Sans (sister Province continuity with Codex)
   Civic accent: deeper ochre-amber; the Capital palette may be revised by Ashara + Petra */

/* --- Design tokens --- */
:root {
  --sp-2:2px;--sp-4:4px;--sp-6:6px;--sp-8:8px;--sp-10:10px;--sp-12:12px;--sp-16:16px;--sp-20:20px;--sp-24:24px;--sp-32:32px;--sp-48:48px;
  /* Text-size scale (shifted up 17 Apr 2026 after on-device walk).
     Settings labels map: Small=14, Medium=17, Large=21. Default baseline is
     Medium — first-time users get the comfortable middle, not the floor.
     The --fs-2xs and --fs-xs clamps (max() floors) continue to protect
     legibility at the Small setting; they're no-op at Medium and Large. */
  --fs-base:17px;
  --fs-2xs:max(11px, calc(var(--fs-base) - 4px));
  --fs-xs:max(12px, calc(var(--fs-base) - 2px));
  --fs-sm:var(--fs-base);
  --fs-md:calc(var(--fs-base) + 2px);
  --fs-lg:calc(var(--fs-base) + 4px);
  --fs-xl:calc(var(--fs-base) + 6px);
  --fs-2xl:calc(var(--fs-base) + 10px);
  --fs-3xl:calc(var(--fs-base) + 16px);
  --r-sm:4px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-2xl:20px;--r-full:9999px;
  --anim-fade:180ms;--anim-room:220ms;--anim-toast:200ms;
  --ff-heading:'Playfair Display', Georgia, 'Times New Roman', serif;
  --ff-body:'Work Sans', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

/* --- Theme: dark (default) --- */
[data-theme="dark"] {
  --bg-primary:#1A1410;
  --bg-secondary:#241C16;
  --bg-card:#2E241B;
  --bg-elevated:#3A2E22;
  --text-primary:#E8DCC8;
  --text-secondary:#B0A088;
  --text-tertiary:#7A6C58;
  --border:#3D3226;
  --border-light:#4A3D2F;
  --accent:#C89A5A;
  --accent-light:#A07E48;
  --accent-dim:#6E5538;
  --focus-ring:#D4B178;
  --success:#6AAF7B;
  --warning:#E0A850;
  --error:#D46A6A;
  --civic:#9D6B3C;  /* ceremonial, used sparingly */
  --gold:#E6C35C;   /* actual gold, used for fresh-activity glow */
  --gold-glow:rgba(230, 195, 92, 0.55);
  --card-shadow:0 1px 3px rgba(0,0,0,0.35);
  --card-shadow-lg:0 4px 12px rgba(0,0,0,0.4);
}

/* --- Theme: light --- */
[data-theme="light"] {
  --bg-primary:#FAF6F0;
  --bg-secondary:#F0EADE;
  --bg-card:#FFFFFF;
  --bg-elevated:#F7F1E3;
  --text-primary:#2C2014;
  --text-secondary:#6B584A;
  --text-tertiary:#9C8E7E;
  --border:#E0D4C0;
  --border-light:#EAE0CE;
  --accent:#8B6530;
  --accent-light:#B0874A;
  --accent-dim:#C4A578;
  --focus-ring:#5C4218;
  --success:#4A7C59;
  --warning:#C4883A;
  --error:#B84C4C;
  --civic:#7A5830;
  --gold:#C9A14A;   /* actual gold, used for fresh-activity glow */
  --gold-glow:rgba(201, 161, 74, 0.5);
  --card-shadow:0 1px 3px rgba(44,32,20,0.08);
  --card-shadow-lg:0 4px 12px rgba(44,32,20,0.12);
}

/* --- Reset --- */
*,*::before,*::after{box-sizing:border-box}
html{height:100%}
body{
  margin:0;
  font-family:var(--ff-body);
  font-size:var(--fs-sm);
  line-height:1.55;
  color:var(--text-primary);
  background:var(--bg-primary);
  min-height:100%;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}
h1,h2,h3,h4{
  font-family:var(--ff-heading);
  font-weight:700;
  margin:0;
  color:var(--text-primary);
}
h1{font-size:var(--fs-3xl);letter-spacing:-0.01em}
h2{font-size:var(--fs-2xl);letter-spacing:-0.005em}
h3{font-size:var(--fs-xl)}
h4{font-size:var(--fs-lg);font-weight:600}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
input,textarea,select{font:inherit;color:inherit}

/* --- Header --- */
#capitalHeader{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  padding:var(--sp-12) var(--sp-16);
  padding-top:calc(var(--sp-12) + env(safe-area-inset-top));
  padding-left:calc(var(--sp-16) + env(safe-area-inset-left));
  padding-right:calc(var(--sp-16) + env(safe-area-inset-right));
  position:sticky;
  top:0;
  z-index:10;
}
.cc-header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:0 auto;
  gap:var(--sp-16);
}
.cc-app-title-btn{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  padding:var(--sp-4) var(--sp-8);
  border-radius:var(--r-sm);
  transition:background var(--anim-fade);
  touch-action:manipulation;
  min-height:44px;
  justify-content:center;
}
.cc-app-title-btn:hover,.cc-app-title-btn:active{background:var(--bg-elevated)}
.cc-app-title{
  font-family:var(--ff-heading);
  font-size:var(--fs-lg);
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:-0.005em;
}
.cc-app-subtitle{
  font-size:var(--fs-xs);
  color:var(--text-tertiary);
  font-style:italic;
  margin-top:1px;
}
.cc-header-actions{display:flex;gap:var(--sp-8)}
.cc-btn-icon{
  width:44px;height:44px;
  border-radius:var(--r-sm);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:var(--text-secondary);
  transition:background var(--anim-fade), color var(--anim-fade);
  touch-action:manipulation;
}
.cc-btn-icon:hover,.cc-btn-icon:active{background:var(--bg-elevated);color:var(--text-primary)}

/* Inline SVG icons inherit currentColor */
.cc-icon{display:block;width:22px;height:22px;color:inherit}

/* Room icons — consistent civic glyph language. Rendered at three sizes:
   lg (room header), md (district tile and card), sm (breadcrumb). The inner
   <svg> fills its container; sizing is on the wrapper span. */
.cc-room-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:var(--room-accent, var(--accent));
  flex-shrink:0;
}
.cc-room-icon svg{display:block;width:100%;height:100%}
.cc-room-icon-lg{width:32px;height:32px}
.cc-room-icon-md{width:22px;height:22px}
.cc-room-icon-sm{width:16px;height:16px}

/* --- Breadcrumb --- */
.cc-breadcrumb{
  background:var(--bg-primary);
  border-bottom:1px solid var(--border-light);
  padding:var(--sp-8) var(--sp-16);
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:var(--sp-6);
  font-size:var(--fs-xs);
  color:var(--text-secondary);
}
.cc-breadcrumb a{color:var(--accent);font-weight:500}
.cc-breadcrumb-sep{color:var(--text-tertiary)}
.cc-breadcrumb-room{
  display:inline-flex;
  align-items:center;
  gap:var(--sp-6);
  color:var(--room-accent, var(--text-primary));
}
.cc-breadcrumb-name{color:var(--text-primary)}

/* --- Room container --- */
.cc-room-container{
  flex:1;
  max-width:1100px;
  width:100%;
  margin:0 auto;
  padding-top:var(--sp-24);
  padding-bottom:var(--sp-24);
  padding-left:max(var(--sp-16), env(safe-area-inset-left));
  padding-right:max(var(--sp-16), env(safe-area-inset-right));
}

/* --- Room core --- */
.cc-room{
  position:relative;
  animation:room-enter var(--anim-room) ease-out;
}
@keyframes room-enter{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
/* Room transition — subtle accent bar that sweeps across the top on entry,
   briefly signalling which district the Sovereign has crossed into. Bard's
   "sense of entering a district" delivered without ceremony. Pseudo-element
   so it imposes no DOM cost; animates opacity and translate only (cheap). */
.cc-room::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:linear-gradient(90deg, transparent 0%, var(--room-accent) 50%, transparent 100%);
  opacity:0;
  pointer-events:none;
  animation:room-accent-sweep 520ms ease-out;
}
@keyframes room-accent-sweep{
  0%{opacity:0;transform:translateX(-30%)}
  25%{opacity:0.9}
  100%{opacity:0;transform:translateX(30%)}
}
/* Respect users who prefer reduced motion — skip the sweep entirely. */
@media (prefers-reduced-motion: reduce){
  .cc-room{animation:none}
  .cc-room::before{animation:none;display:none}
}
.cc-room-header{
  margin-bottom:var(--sp-24);
  padding-bottom:var(--sp-16);
  border-bottom:1px solid var(--border);
}
.cc-room-eyebrow{
  font-size:var(--fs-2xs);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:var(--accent);
  margin-bottom:var(--sp-8);
}
.cc-room-title{
  font-size:var(--fs-3xl);
  display:flex;
  align-items:center;
  gap:var(--sp-12);
  line-height:1.15;
}
.cc-room-title-text{display:inline-block}
body[data-tonal="ceremonial"] .cc-room-title{justify-content:center}
.cc-room-subtitle{
  font-family:var(--ff-heading);
  font-size:var(--fs-md);
  font-style:italic;
  color:var(--text-secondary);
  margin-top:var(--sp-4);
}
.cc-room-description{
  color:var(--text-secondary);
  max-width:60ch;
  margin-top:var(--sp-12);
  line-height:1.6;
}

/* --- Cards --- */
.cc-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:var(--sp-16);
  box-shadow:var(--card-shadow);
}
.cc-card + .cc-card{margin-top:var(--sp-12)}
.cc-card-title{
  font-family:var(--ff-heading);
  font-size:var(--fs-lg);
  font-weight:700;
  margin-bottom:var(--sp-6);
}
.cc-card-subtitle{
  font-size:var(--fs-xs);
  color:var(--text-tertiary);
  font-style:italic;
  margin-bottom:var(--sp-12);
}

/* --- Capital Overview — room grid --- */
.cc-capital-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:var(--sp-16);
  margin-top:var(--sp-16);
}
.cc-room-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--r-md);
  padding:var(--sp-16);
  text-align:left;
  cursor:pointer;
  transition:transform var(--anim-fade), box-shadow var(--anim-fade), border-color var(--anim-fade);
  display:block;
  width:100%;
}
.cc-room-card{touch-action:manipulation;min-height:44px}
.cc-room-card:hover,.cc-room-card:active{
  transform:translateY(-1px);
  box-shadow:var(--card-shadow-lg);
  border-left-color:var(--civic);
}
.cc-room-card-header{
  display:flex;
  align-items:center;
  gap:var(--sp-10);
  margin-bottom:var(--sp-4);
}
.cc-room-card-name{
  font-family:var(--ff-heading);
  font-weight:700;
  font-size:var(--fs-md);
  color:var(--text-primary);
}
.cc-room-card-function{
  font-size:var(--fs-xs);
  color:var(--text-secondary);
  line-height:1.5;
  margin-bottom:var(--sp-8);
}
.cc-room-card-residents{
  font-size:var(--fs-2xs);
  color:var(--text-tertiary);
  font-style:italic;
  letter-spacing:0.03em;
}

/* --- Resident cards (Senate seats, Minister offices) --- */
.cc-resident-list{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
  gap:var(--sp-12);
  margin-top:var(--sp-16);
}
.cc-resident-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:var(--sp-12) var(--sp-16);
}
.cc-resident-name{
  font-family:var(--ff-heading);
  font-weight:700;
  font-size:var(--fs-md);
  margin-bottom:var(--sp-2);
}
.cc-resident-title{
  font-size:var(--fs-xs);
  color:var(--accent);
  font-style:italic;
  margin-bottom:var(--sp-6);
}
.cc-resident-trait{
  font-size:var(--fs-xs);
  color:var(--text-secondary);
  line-height:1.5;
}
.cc-resident-status{
  display:inline-block;
  margin-top:var(--sp-8);
  padding:var(--sp-2) var(--sp-8);
  border-radius:var(--r-sm);
  font-size:var(--fs-2xs);
  letter-spacing:0.05em;
  text-transform:uppercase;
  background:var(--bg-elevated);
  color:var(--text-tertiary);
}
.cc-resident-status[data-status="awaiting-ratification"]{color:var(--warning)}
.cc-resident-status[data-status="seated"]{color:var(--success)}

/* --- Ratification badge (profile_version + edit_round + edit_date) --- */
.cc-resident-ratification{
  display:inline-block;
  margin-top:var(--sp-6);
  margin-right:var(--sp-6);
  padding:var(--sp-2) var(--sp-8);
  border-radius:var(--r-sm);
  border-left:2px solid var(--border);
  background:var(--bg-elevated);
  font-size:var(--fs-2xs);
  letter-spacing:0.03em;
  color:var(--text-tertiary);
}
.cc-ratification-ratified{color:var(--success);border-left-color:var(--success)}
.cc-ratification-draft{color:var(--warning);border-left-color:var(--warning)}
.cc-ratification-pending{color:var(--text-tertiary);border-left-color:var(--border)}

/* --- Gates --- */
.cc-gates-list{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
  gap:var(--sp-16);
  margin-top:var(--sp-16);
}
.cc-gate-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--civic);
  border-radius:var(--r-md);
  padding:var(--sp-16);
}
.cc-gate-name{
  font-family:var(--ff-heading);
  font-weight:700;
  font-size:var(--fs-md);
  margin-bottom:var(--sp-2);
}
.cc-gate-province{
  font-size:var(--fs-xs);
  color:var(--text-tertiary);
  font-style:italic;
  margin-bottom:var(--sp-8);
}
.cc-gate-description{
  font-size:var(--fs-xs);
  color:var(--text-secondary);
  line-height:1.5;
  margin-bottom:var(--sp-12);
}
.cc-gate-link{
  display:inline-block;
  font-size:var(--fs-xs);
  color:var(--accent);
  font-weight:500;
}

/* --- Status banner (foundation-stage "not yet open") --- */
.cc-status-banner{
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-left:3px solid var(--warning);
  border-radius:var(--r-md);
  padding:var(--sp-12) var(--sp-16);
  margin-top:var(--sp-16);
  font-size:var(--fs-xs);
  color:var(--text-secondary);
  font-style:italic;
  line-height:1.6;
}

/* --- Toasts --- */
.cc-toast-container{
  position:fixed;
  bottom:var(--sp-20);
  left:50%;
  transform:translateX(-50%);
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:var(--sp-8);
  pointer-events:none;
}
.cc-toast{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--r-sm);
  padding:var(--sp-10) var(--sp-16);
  box-shadow:var(--card-shadow-lg);
  font-size:var(--fs-xs);
  color:var(--text-primary);
  animation:toast-in var(--anim-toast) ease-out;
  pointer-events:auto;
  max-width:360px;
}
@keyframes toast-in{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* --- Overlay --- */
.cc-overlay-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:50;
}
.cc-overlay{
  position:fixed;
  inset:auto var(--sp-16) var(--sp-16) var(--sp-16);
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:var(--sp-20);
  box-shadow:var(--card-shadow-lg);
  z-index:60;
  max-height:80vh;
  overflow-y:auto;
  max-width:520px;
  margin:0 auto;
}
.cc-overlay-title{
  font-family:var(--ff-heading);
  font-size:var(--fs-xl);
  margin:0 0 var(--sp-8);
  color:var(--text-primary);
}
.cc-pref-group{
  margin-top:var(--sp-20);
  padding-top:var(--sp-16);
  border-top:1px solid var(--border-light);
}
.cc-pref-group:first-of-type{border-top:none;padding-top:0}
.cc-pref-label{
  font-family:var(--ff-heading);
  font-size:var(--fs-md);
  font-weight:600;
  margin:0 0 var(--sp-10);
  color:var(--text-primary);
}
.cc-pref-row{
  display:flex;
  flex-wrap:wrap;
  gap:var(--sp-8);
  margin-bottom:var(--sp-10);
}
.cc-pref-current{
  font-size:var(--fs-xs);
  color:var(--text-tertiary);
  font-style:italic;
  margin:0;
  letter-spacing:0.02em;
}
.cc-pref-actions{
  margin-top:var(--sp-24);
  padding-top:var(--sp-16);
  border-top:1px solid var(--border-light);
  display:flex;
  justify-content:flex-end;
}
.cc-pref-btn{
  padding:var(--sp-10) var(--sp-16);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  background:var(--bg-elevated);
  color:var(--text-primary);
  font-family:var(--ff-body);
  font-size:var(--fs-sm);
  min-height:44px;
  min-width:80px;
  cursor:pointer;
  touch-action:manipulation;
  transition:background var(--anim-fade), border-color var(--anim-fade), color var(--anim-fade);
}
.cc-pref-btn:hover,.cc-pref-btn:active{
  background:var(--bg-card);
  border-color:var(--accent);
}
.cc-pref-btn[aria-pressed="true"]{
  background:var(--accent);
  border-color:var(--accent);
  color:var(--bg-primary);
  font-weight:600;
}
.cc-pref-btn-ghost{
  background:transparent;
  color:var(--text-secondary);
  min-width:auto;
}

/* --- Footer — civic signature --- */
.cc-footer{
  background:var(--bg-secondary);
  border-top:1px solid var(--border);
  padding:var(--sp-10) var(--sp-16);
  padding-bottom:calc(var(--sp-10) + env(safe-area-inset-bottom));
  padding-left:calc(var(--sp-16) + env(safe-area-inset-left));
  padding-right:calc(var(--sp-16) + env(safe-area-inset-right));
  font-size:var(--fs-2xs);
  color:var(--text-tertiary);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  gap:var(--sp-12);
  letter-spacing:0.04em;
}
.cc-footer-sig{
  font-family:var(--ff-heading);
  font-style:italic;
  color:var(--text-secondary);
  font-size:var(--fs-xs);
  letter-spacing:0.05em;
}
.cc-footer-meta{
  display:inline-flex;
  flex-wrap:wrap;
  gap:var(--sp-6);
  align-items:center;
  text-transform:uppercase;
  letter-spacing:0.08em;
}
.cc-footer-sep{color:var(--border-light);user-select:none}
.cc-footer-stage{color:var(--room-accent, var(--accent));font-weight:600}

/* --- Tonal registers — the atmospheres of the Capital's districts ---
   Charter Article 4: the Capital is a city, not a dashboard. Each room has
   its own tonal register. A register declares an atmosphere via two cascaded
   tokens: --room-accent (the room's signature color) and --room-rule (its
   border weight). Further decorations — header weight, eyebrow letter-spacing,
   card left-rule color — derive from these two. Subtle, cumulative, legible. */
body{--room-accent:var(--accent);--room-rule:var(--border);--room-eyebrow-letter:0.15em}
body[data-tonal="formal"]{--room-accent:var(--accent);--room-rule:var(--accent-dim);--room-eyebrow-letter:0.2em}
body[data-tonal="ceremonial"]{--room-accent:var(--civic);--room-rule:var(--civic);--room-eyebrow-letter:0.25em}
body[data-tonal="casual"]{--room-accent:var(--accent-light);--room-rule:var(--border-light);--room-eyebrow-letter:0.1em}
body[data-tonal="scholarly"]{--room-accent:var(--accent);--room-rule:var(--accent-dim);--room-eyebrow-letter:0.18em}
body[data-tonal="analytical"]{--room-accent:var(--success);--room-rule:var(--border);--room-eyebrow-letter:0.12em}
body[data-tonal="exploratory"]{--room-accent:var(--accent-light);--room-rule:var(--border-light);--room-eyebrow-letter:0.1em}
body[data-tonal="civic"]{--room-accent:var(--civic);--room-rule:var(--civic);--room-eyebrow-letter:0.22em}
body[data-tonal="contemplative"]{--room-accent:var(--accent-dim);--room-rule:var(--border);--room-eyebrow-letter:0.14em}
body[data-tonal="steady"]{--room-accent:var(--success);--room-rule:var(--border);--room-eyebrow-letter:0.12em}
body[data-tonal="generative"]{--room-accent:var(--warning);--room-rule:var(--border-light);--room-eyebrow-letter:0.1em}
body[data-tonal="neutral"]{--room-accent:var(--accent);--room-rule:var(--border);--room-eyebrow-letter:0.15em}

/* Apply the tonal tokens to room chrome */
body .cc-room-header{border-bottom-color:var(--room-rule)}
body .cc-room-eyebrow{color:var(--room-accent);letter-spacing:var(--room-eyebrow-letter)}
body[data-tonal="ceremonial"] .cc-room-title{font-family:var(--ff-heading);text-align:center}
body[data-tonal="ceremonial"] .cc-room-subtitle{text-align:center}
body[data-tonal="ceremonial"] .cc-room-description{margin-left:auto;margin-right:auto;text-align:center}
body[data-tonal="ceremonial"] .cc-room-header{border-bottom-width:2px;padding-bottom:var(--sp-20)}
body[data-tonal="formal"] .cc-room-header{border-bottom-width:2px}
body[data-tonal="formal"] .cc-room-title{letter-spacing:0.01em}
body[data-tonal="casual"] .cc-room-header{border-bottom-style:dashed}
body[data-tonal="scholarly"] .cc-room-title{font-style:italic}
body[data-tonal="civic"] .cc-room-title{letter-spacing:0.02em}
body[data-tonal="civic"] .cc-room-header{border-bottom-width:2px}

/* Card accents per register — subtle left-rule color shift */
.cc-card{border-left:3px solid var(--room-accent)}

/* --- Civic breadcrumb with tonal chip --- */
.cc-tonal-chip{
  display:inline-flex;
  align-items:center;
  gap:var(--sp-4);
  margin-left:var(--sp-12);
  padding:var(--sp-2) var(--sp-8);
  border-radius:var(--r-full);
  border:1px solid var(--room-rule);
  color:var(--room-accent);
  font-size:var(--fs-2xs);
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  background:var(--bg-elevated);
}
.cc-tonal-chip-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--room-accent);
  display:inline-block;
}

/* --- Civic Hearth — the Capital Overview as Dawn Page, per Edict IV ---
   Warm, quiet, inviting. Presence before telemetry. A hearth with an
   inscribed wall, not a task-dump. */
.cc-hearth{padding-top:var(--sp-12)}

.cc-hearth-header{
  text-align:center;
  padding:var(--sp-24) var(--sp-16) var(--sp-32);
  border-bottom:1px solid var(--border);
  margin-bottom:var(--sp-32);
}
.cc-hearth-eyebrow{
  font-size:var(--fs-2xs);
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:var(--sp-12);
  font-weight:600;
}
.cc-hearth-date{
  font-family:var(--ff-heading);
  font-size:var(--fs-2xl);
  font-weight:400;
  color:var(--text-primary);
  line-height:1.2;
  margin-bottom:var(--sp-8);
}
.cc-hearth-stage{
  font-family:var(--ff-heading);
  font-size:var(--fs-md);
  font-style:italic;
  color:var(--text-secondary);
  max-width:52ch;
  margin:0 auto;
  line-height:1.5;
}

/* Hearth tiles — the Capital's bulletin wall. Six live surfaces rendered in
   a 2-column grid on phone, 3-column on wider viewports. Each tile is a
   tappable civic signal with icon, label, body, and meta. Fresh items
   (< 24h) get a subtle accent glow to indicate recent activity. Staggered
   fade-in animation on render so the Hearth blooms rather than appears. */
.cc-hearth-tiles{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:var(--sp-10);
  margin-bottom:var(--sp-32);
}
@media (min-width: 760px){
  .cc-hearth-tiles{grid-template-columns:repeat(3, minmax(0, 1fr))}
}
.cc-hearth-tile{
  display:flex;
  flex-direction:column;
  gap:var(--sp-6);
  background:var(--bg-card);
  border:1px solid var(--border);
  border-top:3px solid var(--accent-dim);
  border-radius:var(--r-md);
  padding:var(--sp-12) var(--sp-14, var(--sp-12));
  cursor:pointer;
  touch-action:manipulation;
  text-align:left;
  font:inherit;
  color:inherit;
  width:100%;
  min-height:132px;
  transition:transform var(--anim-fade), box-shadow var(--anim-fade), border-top-color var(--anim-fade);
  opacity:0;
  animation:hearth-tile-in 480ms ease-out forwards;
}
.cc-hearth-tile:hover,
.cc-hearth-tile:active{
  transform:translateY(-1px);
  box-shadow:var(--card-shadow-lg);
  border-top-color:var(--accent);
}
.cc-hearth-tile:focus-visible{
  outline:2px solid var(--focus-ring);
  outline-offset:2px;
}
/* Stagger the tile entry so they bloom in sequence rather than all at once. */
.cc-hearth-tile:nth-child(1){animation-delay:0ms}
.cc-hearth-tile:nth-child(2){animation-delay:60ms}
.cc-hearth-tile:nth-child(3){animation-delay:120ms}
.cc-hearth-tile:nth-child(4){animation-delay:180ms}
.cc-hearth-tile:nth-child(5){animation-delay:240ms}
.cc-hearth-tile:nth-child(6){animation-delay:300ms}
@keyframes hearth-tile-in{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
@media (prefers-reduced-motion: reduce){
  .cc-hearth-tile{animation:none;opacity:1}
}

/* Fresh glow — items with activity in the last day earn a gold accent
   that breathes. A ::after pseudo-element carries the pulsing shadow so
   the animation is independent of the tile's one-time bloom-in. The glow
   is visible even when the page isn't reloaded (PWA launches to cached
   state skip the bloom; the pulse persists regardless). */
.cc-hearth-tile{position:relative}
.cc-hearth-tile-fresh{
  border-top-color:var(--gold);
}
.cc-hearth-tile-fresh::after{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:inherit;
  pointer-events:none;
  box-shadow:0 0 0 0 transparent;
  animation:hearth-fresh-pulse 2.6s ease-in-out infinite;
}
@keyframes hearth-fresh-pulse{
  0%,100%{box-shadow:0 0 0 0 var(--gold-glow), 0 0 0 1px var(--gold) inset}
  50%{box-shadow:0 0 16px 2px var(--gold-glow), 0 0 0 1px var(--gold) inset}
}
.cc-hearth-tile-fresh:hover,
.cc-hearth-tile-fresh:active{
  border-top-color:var(--gold);
}
.cc-hearth-tile-fresh-dot{
  color:var(--gold);
  font-size:9px;
  line-height:1;
  margin-left:auto;
  align-self:center;
  animation:hearth-fresh-dot 1.8s ease-in-out infinite;
  display:inline-block;
  transform-origin:center;
}
@keyframes hearth-fresh-dot{
  0%,100%{opacity:0.55;transform:scale(1)}
  50%{opacity:1;transform:scale(1.45)}
}
@media (prefers-reduced-motion: reduce){
  .cc-hearth-tile-fresh::after{animation:none;box-shadow:0 0 0 1px var(--gold) inset}
  .cc-hearth-tile-fresh-dot{animation:none;opacity:1}
}

/* Warn tone — Scriptorium tile when there are unresolved errors/warnings. */
.cc-hearth-tile-warn{border-top-color:var(--warning)}
.cc-hearth-tile-warn:hover,
.cc-hearth-tile-warn:active{border-top-color:var(--warning)}

/* Internal layout: icon + label in a head row; body below; meta at the
   bottom; optional extra (e.g. mini progress bar) above meta. */
.cc-hearth-tile-head{
  display:flex;
  align-items:center;
  gap:var(--sp-8);
}
.cc-hearth-tile-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;height:22px;
  color:var(--accent);
  flex-shrink:0;
}
.cc-hearth-tile-icon svg{width:100%;height:100%;display:block}
.cc-hearth-tile-fresh .cc-hearth-tile-icon{color:var(--gold)}
.cc-hearth-tile-warn .cc-hearth-tile-icon{color:var(--warning)}
.cc-hearth-tile-label{
  font-size:var(--fs-2xs);
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--accent);
  font-weight:600;
}
.cc-hearth-tile-fresh .cc-hearth-tile-label{color:var(--gold)}
.cc-hearth-tile-warn .cc-hearth-tile-label{color:var(--warning)}
.cc-hearth-tile-body{
  font-family:var(--ff-heading);
  font-size:var(--fs-sm);
  color:var(--text-primary);
  line-height:1.35;
}
.cc-hearth-tile-meta{
  font-size:var(--fs-2xs);
  color:var(--text-tertiary);
  font-style:italic;
  letter-spacing:0.02em;
  margin-top:auto;
  line-height:1.4;
}
.cc-hearth-tile-progress{
  display:block;
  margin-top:var(--sp-2);
}
.cc-hearth-tile-progress .cc-progress-bar{height:6px}

/* --- City map — rooms as districts, not a flat grid --- */
.cc-city-map{margin-top:var(--sp-24)}
.cc-district{
  margin-bottom:var(--sp-32);
}
.cc-district-header{
  display:flex;
  align-items:baseline;
  gap:var(--sp-12);
  flex-wrap:wrap;
  padding-bottom:var(--sp-8);
  border-bottom:1px solid var(--border-light);
  margin-bottom:var(--sp-16);
}
.cc-district-label{
  font-family:var(--ff-heading);
  font-size:var(--fs-xl);
  color:var(--text-primary);
  letter-spacing:0.02em;
  font-weight:700;
}
.cc-district-note{
  font-size:var(--fs-xs);
  color:var(--text-tertiary);
  font-style:italic;
}
.cc-district-rooms{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:var(--sp-12);
}

/* --- Chronicle inscription strip — one line from the Republic's memory --- */
.cc-chronicle-strip{
  margin-top:var(--sp-32);
  padding:var(--sp-20) var(--sp-16);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  text-align:center;
  font-family:var(--ff-heading);
  font-style:italic;
  color:var(--text-secondary);
  font-size:var(--fs-md);
  line-height:1.5;
  letter-spacing:0.02em;
}
.cc-chronicle-source{
  display:block;
  margin-top:var(--sp-8);
  font-family:var(--ff-body);
  font-style:normal;
  font-size:var(--fs-2xs);
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-tertiary);
  font-weight:600;
}

/* --- Room interiors (Bucket 1 depth pass) --- */

/* Cabinet cycle list — Senate */
.cc-cycle-list{display:flex;flex-direction:column;gap:var(--sp-4)}
.cc-cycle-row{
  display:flex;gap:var(--sp-12);align-items:baseline;
  padding:var(--sp-8) var(--sp-12);
  border-left:2px solid var(--room-rule, var(--border));
  background:var(--bg-elevated);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
}
.cc-cycle-week{
  font-family:var(--ff-heading);font-weight:700;
  font-size:var(--fs-xs);color:var(--room-accent, var(--accent));
  min-width:60px;letter-spacing:0.05em;
}
.cc-cycle-note{font-size:var(--fs-xs);color:var(--text-secondary);line-height:1.5}

/* Decree ledger — Senate */
.cc-decree-list{display:flex;flex-direction:column;gap:var(--sp-6)}
.cc-decree-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:var(--sp-12);align-items:baseline;
  padding:var(--sp-10) var(--sp-12);
  background:var(--bg-elevated);
  border-left:2px solid var(--room-accent, var(--accent));
  border-radius:0 var(--r-sm) var(--r-sm) 0;
}
.cc-decree-id{
  font-family:var(--ff-heading);font-weight:700;
  font-size:var(--fs-xs);color:var(--room-accent, var(--accent));
  letter-spacing:0.05em;
}
.cc-decree-title{font-size:var(--fs-xs);color:var(--text-primary);line-height:1.4}
.cc-decree-date{font-size:var(--fs-2xs);color:var(--text-tertiary);letter-spacing:0.05em;white-space:nowrap}

/* Books of the Constitution — Temple */
.cc-books-list{display:flex;flex-direction:column}
.cc-book-row{
  display:grid;
  grid-template-columns:90px 1fr auto;
  gap:var(--sp-12);align-items:center;
  padding:var(--sp-10) var(--sp-4);
  border-bottom:1px solid var(--border-light);
}
.cc-book-row:last-child{border-bottom:none}
.cc-book-numeral{
  font-family:var(--ff-heading);font-weight:700;
  font-size:var(--fs-xs);color:var(--text-tertiary);
  letter-spacing:0.08em;
}
.cc-book-title{font-family:var(--ff-heading);font-weight:500;font-size:var(--fs-sm);color:var(--text-primary)}
.cc-book-state{
  font-size:var(--fs-2xs);letter-spacing:0.08em;text-transform:uppercase;
  padding:var(--sp-2) var(--sp-8);border-radius:var(--r-full);
  border:1px solid var(--border);color:var(--text-tertiary);
  white-space:nowrap;
  justify-self:end;
}
.cc-book-state[data-state="ratified"]{color:var(--success);border-color:var(--success)}
.cc-book-state[data-state="partial"]{color:var(--accent);border-color:var(--accent-dim)}
.cc-book-state[data-state="drafting"]{color:var(--warning);border-color:var(--warning)}

/* Narrow viewport: stack the book row so long state labels (e.g. Book IV's
   "EIGHT EDICTS RATIFIED; BOOK PENDING") don't push the card past the
   viewport edge. Numeral + title share the top row; pill drops to its own
   row with full horizontal breathing room. */
@media (max-width: 560px){
  .cc-book-row{
    grid-template-columns:72px 1fr;
    grid-template-areas:"numeral title" "pill pill";
    row-gap:var(--sp-6);
    align-items:baseline;
  }
  .cc-book-numeral{grid-area:numeral}
  .cc-book-title{grid-area:title}
  .cc-book-state{
    grid-area:pill;
    justify-self:start;
    white-space:normal;
    border-radius:var(--r-sm);
  }
}

/* Four Pillars — Temple */
.cc-pillar-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:var(--sp-8)}
.cc-pillar{
  display:grid;grid-template-columns:48px 1fr;gap:var(--sp-12);align-items:center;
  padding:var(--sp-10) var(--sp-12);
  background:var(--bg-elevated);
  border-radius:var(--r-sm);
  border-left:3px solid var(--civic);
}
.cc-pillar-numeral{
  font-family:var(--ff-heading);font-weight:700;font-size:var(--fs-xl);
  color:var(--civic);text-align:center;letter-spacing:0.05em;
}
.cc-pillar-name{font-family:var(--ff-heading);font-weight:600;font-size:var(--fs-md);color:var(--text-primary)}

/* Sovereign's Covenant quote — Temple */
.cc-covenant{
  margin:0;padding:var(--sp-16) var(--sp-20);
  border-left:3px solid var(--civic);
  background:var(--bg-elevated);
  border-radius:0 var(--r-sm) var(--r-sm) 0;
  font-family:var(--ff-heading);font-size:var(--fs-md);
  color:var(--text-primary);line-height:1.6;
}

/* Ledger — Treasury */
.cc-ledger{
  display:grid;grid-template-columns:1fr auto;
  row-gap:var(--sp-8);column-gap:var(--sp-16);
  margin:0;
}
.cc-ledger-label{font-size:var(--fs-xs);color:var(--text-secondary);margin:0}
.cc-ledger-value{
  font-family:var(--ff-heading);font-weight:600;
  font-size:var(--fs-sm);color:var(--text-primary);
  text-align:right;margin:0;
}

/* Monument stages — Productivity + Plaza */
.cc-stages-list{display:flex;flex-direction:column;gap:var(--sp-8)}
.cc-stage{
  display:grid;grid-template-columns:1fr auto;gap:var(--sp-12);align-items:center;
  padding:var(--sp-10) var(--sp-12);
  border:1px solid var(--border);border-radius:var(--r-sm);
  background:var(--bg-card);
}
.cc-stage[data-state="active"]{border-left:3px solid var(--success);background:var(--bg-elevated)}
.cc-stage[data-state="pending"]{color:var(--text-tertiary);opacity:0.85}
.cc-stage-body{display:flex;flex-direction:column;gap:var(--sp-2);min-width:0}
.cc-stage-name{font-family:var(--ff-heading);font-weight:600;font-size:var(--fs-sm)}
.cc-stage-note{font-size:var(--fs-2xs);color:var(--text-tertiary);font-style:italic}
.cc-stage-state{
  font-size:var(--fs-2xs);letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-tertiary);white-space:nowrap;
}
.cc-stage[data-state="active"] .cc-stage-state{color:var(--success);font-weight:600}

/* Monument progress — SVG progress bar on the Plaza.
   Using SVG rects avoids inline style= on width (canon-0002). Track is the
   full-width background rect; complete fill is success-green; partial fill
   is the room accent. Fills are painted in order so partial stacks onto
   complete's right edge via its x offset set in the markup. */
.cc-monument-progress{
  padding:var(--sp-8) 0;
}
.cc-monument-progress-head{
  display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;
  gap:var(--sp-8);margin-bottom:var(--sp-8);
}
.cc-monument-progress-stage{
  font-family:var(--ff-heading);font-weight:600;font-size:var(--fs-md);
  color:var(--text-primary);
}
.cc-monument-progress-count{
  font-size:var(--fs-2xs);letter-spacing:0.08em;text-transform:uppercase;
  color:var(--text-tertiary);
}
.cc-progress-bar{
  display:block;width:100%;height:8px;
  overflow:visible;
}
.cc-progress-track{fill:var(--bg-elevated)}
.cc-progress-fill-complete{fill:var(--success)}
.cc-progress-fill-partial{fill:var(--accent)}

/* Foundation criteria ledger — Productivity */
.cc-criteria-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:var(--sp-4)}
.cc-criterion{
  display:grid;grid-template-columns:88px 1fr;gap:var(--sp-12);
  padding:var(--sp-8) var(--sp-12);
  border-left:2px solid var(--border);

// --- HTML escaping (Hard Rule 4 carry-over from SproutLab) ---
CC.escHtml = function(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
};
CC.escAttr = CC.escHtml;

// --- DOM helpers ---
CC.$ = function(sel, root) { return (root || document).querySelector(sel); };
CC.$$ = function(sel, root) { return Array.prototype.slice.call((root || document).querySelectorAll(sel)); };

// --- Operational log (the Scriptorium writes to here) -----------------------
// The Capital's own record of runtime events: errors, warnings, informational
// notices. Stored as a ring buffer in localStorage so it survives reload but
// does not grow unbounded. Distinct from Codex's canonical records.
CC.LOG_KEY = 'cc-log';
CC.LOG_MAX = 200;
CC.LOG_LEVELS = ['error', 'warn', 'info'];

CC.log = function(level, message, context) {
  if (CC.LOG_LEVELS.indexOf(level) === -1) level = 'info';
  var entry = {
    ts: new Date().toISOString(),
    level: level,
    message: String(message == null ? '' : message),
    context: context || null,
  };
  try {
    var raw = localStorage.getItem(CC.LOG_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) arr = [];
    arr.push(entry);
    if (arr.length > CC.LOG_MAX) arr = arr.slice(arr.length - CC.LOG_MAX);
    localStorage.setItem(CC.LOG_KEY, JSON.stringify(arr));
  } catch (e) {
    // Storage unavailable or quota exceeded; swallow to prevent logging recursion.
  }
  // Best-effort console mirror for real-time debugging.
  try {
    if (typeof console !== 'undefined' && typeof console[level] === 'function') {
      if (context) console[level](message, context);
      else console[level](message);
    }
  } catch (e) {}
  // If the Scriptorium is the current room, re-render to show the new entry.
  if (CC.state && CC.state.current_room === 'scriptorium') {
    var room = CC.ROOMS && CC.ROOMS.find(function(r) { return r.id === 'scriptorium'; });
    if (room && CC.renderRoom) CC.renderRoom(room);
  }
};

CC.readLog = function() {
  try {
    var raw = localStorage.getItem(CC.LOG_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
};

CC.clearLog = function() {
  try { localStorage.removeItem(CC.LOG_KEY); } catch (e) {}
  if (CC.state && CC.state.current_room === 'scriptorium') {
    var room = CC.ROOMS && CC.ROOMS.find(function(r) { return r.id === 'scriptorium'; });
    if (room && CC.renderRoom) CC.renderRoom(room);
  }
  if (CC.toast) CC.toast('Scriptorium cleared.');
};

CC.copyLog = function() {
  var entries = CC.readLog();
  var text = entries.map(function(e) {
    var line = '[' + e.ts + '] [' + e.level.toUpperCase() + '] ' + e.message;
    if (e.context) {
      try { line += '\n  context: ' + JSON.stringify(e.context); } catch (x) {}
    }
    return line;
  }).join('\n');
  if (!text) text = '(Scriptorium is empty.)';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      if (CC.toast) CC.toast('Scriptorium copied to clipboard.');
    }).catch(function() {
      if (CC.toast) CC.toast('Copy failed \u2014 clipboard unavailable.');
    });
  } else {
    if (CC.toast) CC.toast('Clipboard API unavailable on this browser.');
  }
};

// --- Routing ---
// Hash-based routing: #/senate, #/forum, #/ministers/orinth, etc.
CC.parseRoute = function() {
  const hash = window.location.hash || '#/';
  const path = hash.replace(/^#/, '') || '/';
  return path;
};

CC.roomByRoute = function(path) {
  if (!path || path === '/') return CC.ROOMS[0];
  return CC.ROOMS.find(function(r) { return r.route === path; }) || null;
};

CC.navigate = function(path) {
  if (path.charAt(0) !== '/') path = '/' + path;
  window.location.hash = '#' + path;
};

CC.onRouteChange = function() {
  const path = CC.parseRoute();
  const room = CC.roomByRoute(path);
  if (!room) {
    document.body.setAttribute('data-tonal', 'neutral');
    CC.renderNotFound(path);
    return;
  }
  CC.state.current_room = room.id;
  // Tonal register cascades to card rules, headers, and breadcrumb chip.
  // Charter Art. 4 — spatial metaphor delivered visually.
  document.body.setAttribute('data-tonal', room.tonal_register || 'neutral');
  CC.renderRoom(room);
  CC.renderBreadcrumb(room);
  window.scrollTo(0, 0);
};

// --- Breadcrumb ---
CC.renderBreadcrumb = function(room) {
  const bar = CC.$('#breadcrumbBar');
  if (!bar) return;
  if (room.id === 'home') {
    bar.hidden = true;
    bar.innerHTML = '';
    return;
  }
  bar.hidden = false;
  // Civic signage: room icon + middle-dot separator + "The Capital" as formal
  // address + room name + tonal chip declaring the register. The icon echoes
  // the room's header glyph so the breadcrumb feels continuous with arrival.
  const home = '<a href="#/" data-action="nav" data-target="/">The Capital</a>';
  const sep = '<span class="cc-breadcrumb-sep">\u00b7</span>';
  const icon = CC.renderIcon ? CC.renderIcon(room.id, 'cc-room-icon-sm') : '';
  const name = '<span class="cc-breadcrumb-room">' + icon
    + '<span class="cc-breadcrumb-name">' + CC.escHtml(room.name) + '</span></span>';
  let chip = '';
  const tonal = room.tonal_register;
  if (tonal && tonal !== 'neutral') {
    chip = '<span class="cc-tonal-chip" data-tonal="' + CC.escAttr(tonal) + '">'
      + '<span class="cc-tonal-chip-dot" aria-hidden="true"></span>'
      + CC.escHtml(tonal) + '</span>';
  }
  // aria-current marks the current room span for screen-reader wayfinding.
  bar.innerHTML = home + sep + name.replace(
    'class="cc-breadcrumb-room"',
    'class="cc-breadcrumb-room" aria-current="location"'
  ) + chip;
};

// --- Toasts ---
CC.toast = function(message, opts) {
  opts = opts || {};
  const container = CC.$('#toastContainer');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'cc-toast';
  el.textContent = message;
  container.appendChild(el);
  const duration = opts.duration || 3000;
  setTimeout(function() {
    el.style.transition = 'opacity 200ms ease-out';
    el.style.opacity = '0';
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 220);
  }, duration);
};

CC.seatsInRoom = function(roomId) {

CC.companionRecord = function(cid) {

  // Once ostia.js fetches companions.json, this will read from the cache.
  const cached = CC.state.cache.companions;
  if (cached && Array.isArray(cached.companions)) {
    const found = cached.companions.find(function(c) { return c.id === cid; });
    if (found) return found;
  }
  // Foundation-stage fallback: minimal record sourced from residence metadata.
  return {

    _placeholder: true,
  };

// --- Event delegation (Hard Rule 3: no inline onclick) ---
CC.handleClick = function(e) {
  let target = e.target;
  // Walk up to find data-action
  while (target && target !== document.body) {
    const action = target.getAttribute && target.getAttribute('data-action');
    if (action) {
      e.preventDefault();
      CC.dispatchAction(action, target, e);
      return;
    }
    target = target.parentNode;
  }
};

CC.dispatchAction = function(action, el, e) {
  switch (action) {
    case 'nav': {
      const t = el.getAttribute('data-target');
      if (t) CC.navigate(t);
      break;
    }
    case 'goHome':
      CC.navigate('/');
      break;
    case 'openSettings':
      CC.openSettings();
      break;
    case 'closeOverlay':
      CC.closeOverlay();
      break;
    case 'setTheme': {
      const t = el.getAttribute('data-theme');
      if (t) {
        CC.setTheme(t);
        // Refresh Settings overlay if open so aria-pressed reflects new state.
        const overlay = CC.$('#overlayContainer');
        if (overlay && !overlay.hidden) CC.openSettings();
      }
      break;
    }
    case 'setTextSize': {
      const s = el.getAttribute('data-size');
      if (s) {
        CC.setTextSize(s);
        const overlay = CC.$('#overlayContainer');
        if (overlay && !overlay.hidden) CC.openSettings();
      }
      break;
    }
    case 'clearLog':
      CC.clearLog();
      break;
    case 'copyLog':
      CC.copyLog();
      break;
    case 'navRoom': {
      const rid = el.getAttribute('data-room');
      if (rid) {
        const room = CC.ROOMS.find(function(r) { return r.id === rid; });
        if (room) CC.navigate(room.route);
      }
      break;
    }
    case 'externalLink': {
      const href = el.getAttribute('data-href');
      if (href) window.open(href, '_blank', 'noopener');
      break;
    }
    default:
      // Silent for unknown actions; Builders will add more
      break;
  }
};

// Icon rendering helper. Returns the SVG markup for a given room id wrapped
// in a size-scoped span. The underlying SVG uses currentColor so it inherits
// from the enclosing context (room header accent, tile text, breadcrumb fg).
CC.renderIcon = function(roomId, sizeClass) {
  var svg = (CC.ICONS && CC.ICONS[roomId]) || (CC.ICONS && CC.ICONS.home) || '';
  if (!svg) return '';
  var cls = 'cc-room-icon ' + (sizeClass || 'cc-room-icon-md');

};

// Timezone-safe short date formatting (canon-0012). Parses YYYY-MM-DD strings
// directly; never constructs a Date from a date-only string.
CC.formatDateShort = function(dateStr) {
  if (!dateStr) return '';
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateStr));
  if (!m) return String(dateStr);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var idx = parseInt(m[2], 10) - 1;
  if (idx < 0 || idx > 11) return dateStr;
  return String(parseInt(m[3], 10)) + ' ' + months[idx] + ' ' + m[1];
};

// Ratification badge — surfaces profile_version and sovereign_edited state
// on companion cards. Three states: ratified (v0.4+), draft (v0.3-draft),
// pending (no profile fetched from Codex yet).
CC.renderRatificationBadge = function(rec) {
  if (!rec || rec._placeholder) {
    return '<div class="cc-resident-ratification cc-ratification-pending">profile pending</div>';
  }
  var meta = rec.meta || {};
  var version = meta.profile_version || '';
  if (!version) {
    return '<div class="cc-resident-ratification cc-ratification-pending">profile pending</div>';
  }
  if (version.indexOf('draft') !== -1) {
    return '<div class="cc-resident-ratification cc-ratification-draft">'
      + CC.escHtml(version) + ' \u00b7 awaiting ratification</div>';
  }
  var edit = meta.sovereign_edited || {};
  var parts = [CC.escHtml(version)];
  if (edit.edit_round) parts.push('round ' + CC.escHtml(String(edit.edit_round)));
  if (edit.edit_date) parts.push(CC.escHtml(CC.formatDateShort(edit.edit_date)));
  return '<div class="cc-resident-ratification cc-ratification-ratified">'
    + parts.join(' \u00b7 ') + '</div>';
};

CC.renderRoomHeader = function(room) {

CC.renderResidentList = function(roomId) {
  const residentIds = CC.residentsOfRoom(roomId);
  if (residentIds.length === 0) {
    return '<p class="cc-muted cc-small cc-mt-16"><em>No standing residents.</em></p>';
  }
  const cards = residentIds.map(function(cid) {
    const rec = CC.companionRecord(cid);
    const residence = CC.RESIDENCE[cid] || {};
    const status = residence.status || 'scaffolded';
    const statusLabel = status.replace(/_/g, ' ');
    const name = (rec.identity && rec.identity.name) || cid;
    const title = (rec.identity && rec.identity.title) || '';
    const trait = (rec.identity && rec.identity.key_trait) || '';
    return [
      '<article class="cc-resident-card">',
      '<div class="cc-resident-name">' + CC.escHtml(name) + '</div>',
      title ? '<div class="cc-resident-title">' + CC.escHtml(title) + '</div>' : '',
      trait ? '<div class="cc-resident-trait">' + CC.escHtml(trait) + '</div>' : '',
      CC.renderRatificationBadge(rec),
      '<span class="cc-resident-status" data-status="' + CC.escAttr(status) + '">' + CC.escHtml(statusLabel) + '</span>',
      '</article>',
    ].join('');
  }).join('');
  return [
    '<h3 class="cc-mt-16">Residents</h3>',
    '<div class="cc-resident-list">' + cards + '</div>',
  ].join('');
};

CC.renderSeatList = function(roomId, labelOverride) {

  if (seatIds.length === 0) {
    return '<p class="cc-muted cc-small cc-mt-16"><em>No seats assigned.</em></p>';
  }
  const cards = seatIds.map(function(cid) {
    const rec = CC.companionRecord(cid);
    const residence = CC.RESIDENCE[cid] || {};
    const status = residence.status || 'scaffolded';
    const statusLabel = status.replace(/_/g, ' ');
    const name = (rec.identity && rec.identity.name) || cid.charAt(0).toUpperCase() + cid.slice(1);
    const title = (rec.identity && rec.identity.title) || '';
    const trait = (rec.identity && rec.identity.key_trait) || '';

    return [
      '<article class="cc-resident-card">',
      '<div class="cc-resident-name">' + CC.escHtml(name) + '</div>',
      title ? '<div class="cc-resident-title">' + CC.escHtml(title) + '</div>' : '',
      trait ? '<div class="cc-resident-trait">' + CC.escHtml(trait) + '</div>' : '',

// --- Civic date — spelled-out ordinal form ---
// "The Seventeenth Day of April, Two Thousand Twenty-Six"
// Uses local date (the Sovereign's timezone). Canon-0012 compliant: does not
// attempt cross-timezone normalization; the Capital's calendar is civic.
CC.ORDINAL_DAYS = [
  'First', 'Second', 'Third', 'Fourth', 'Fifth', 'Sixth', 'Seventh',
  'Eighth', 'Ninth', 'Tenth', 'Eleventh', 'Twelfth', 'Thirteenth',
  'Fourteenth', 'Fifteenth', 'Sixteenth', 'Seventeenth', 'Eighteenth',
  'Nineteenth', 'Twentieth', 'Twenty-First', 'Twenty-Second',
  'Twenty-Third', 'Twenty-Fourth', 'Twenty-Fifth', 'Twenty-Sixth',
  'Twenty-Seventh', 'Twenty-Eighth', 'Twenty-Ninth', 'Thirtieth',
  'Thirty-First',
];
CC.MONTH_NAMES = [
  'January', 'February', 'March', 'April', 'May', 'June',
  'July', 'August', 'September', 'October', 'November', 'December',
];
CC.YEAR_WORDS = {
  2026: 'Two Thousand Twenty-Six',
  2027: 'Two Thousand Twenty-Seven',
  2028: 'Two Thousand Twenty-Eight',
  2029: 'Two Thousand Twenty-Nine',
  2030: 'Two Thousand Thirty',
};
CC.formatCivicDate = function(d) {
  var date = d || new Date();
  var dayIdx = date.getDate() - 1;
  var day = CC.ORDINAL_DAYS[dayIdx] || String(date.getDate());
  var month = CC.MONTH_NAMES[date.getMonth()] || '';
  var year = CC.YEAR_WORDS[date.getFullYear()] || String(date.getFullYear());
  return 'The ' + day + ' Day of ' + month + ', ' + year;
};

// Render the civic date with the year wrapped in a nowrap span so the four-word
// year ("Two Thousand Twenty-Six") never breaks mid-phrase on narrow viewports.
CC.renderCivicDateHTML = function() {
  var date = new Date();
  var dayIdx = date.getDate() - 1;
  var day = CC.ORDINAL_DAYS[dayIdx] || String(date.getDate());
  var month = CC.MONTH_NAMES[date.getMonth()] || '';
  var year = CC.YEAR_WORDS[date.getFullYear()] || String(date.getFullYear());
  return 'The ' + CC.escHtml(day) + ' Day of ' + CC.escHtml(month) + ', '
    + '<span class="cc-nowrap">' + CC.escHtml(year) + '</span>';
};

// --- Civic Hearth — the Dawn Page of the Capital, per Edict IV ---
// Warm, quiet, inviting. Presence first, activity second, demands never.
// A hearth with an inscribed wall.

// Small indicator under the Hearth header when the Scriptorium holds
// unresolved errors or warnings. Subtle, not alarmist. Tapping navigates to
// the Scriptorium. Rendered only when something warrants attention.
CC.renderScriptoriumIndicator = function() {
  if (!CC.readLog) return '';
  var entries = CC.readLog();
  var errs = 0, warns = 0;
  entries.forEach(function(e) {
    if (e.level === 'error') errs++;
    else if (e.level === 'warn') warns++;
  });
  if (errs === 0 && warns === 0) return '';
  var parts = [];
  if (errs) parts.push(errs + ' error' + (errs === 1 ? '' : 's'));
  if (warns) parts.push(warns + ' warning' + (warns === 1 ? '' : 's'));
  var label = parts.join(' \u00b7 ') + ' \u00b7 see the Scriptorium';
  return '<button class="cc-hearth-indicator" data-action="navRoom" data-room="scriptorium">'
    + CC.escHtml(label) + '</button>';
};

CC.renderHearthHeader = function() {
  return [
    '<header class="cc-hearth-header">',
    '<div class="cc-hearth-eyebrow">The Capital Stands</div>',
    '<div class="cc-hearth-date">' + CC.renderCivicDateHTML() + '</div>',
    '<p class="cc-hearth-stage">',
    'The Capital is at Foundation. The Senate is scaffolded but does not yet convene. ',
    'The Ministers hold their offices. The Gates are open. The Library is within reach.',
    '</p>',
    CC.renderScriptoriumIndicator(),
    '</header>',
  ].join('');
};

// Living cards: latest decree, latest canon, undrafted profile count.
// Each card is presence, not telemetry. Nothing blinks. Nothing demands.
// Returns true if an ISO date string (YYYY-MM-DD) is within N days of today.
// Used to mark Hearth tiles as "fresh" so recent activity gets a subtle
// accent highlight, honoring the Sovereign's directive that the Hearth feel
// alive rather than static.
CC.isRecent = function(dateStr, days) {
  if (!dateStr) return false;
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateStr));
  if (!m) return false;
  var then = new Date(
    parseInt(m[1], 10),
    parseInt(m[2], 10) - 1,
    parseInt(m[3], 10)
  );
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var diffMs = today.getTime() - then.getTime();
  var diffDays = diffMs / (1000 * 60 * 60 * 24);
  return diffDays >= -1 && diffDays <= (days || 1);
};

CC.buildHearthTile_monument = function() {
  var complete = 0, partial = 0;
  var total = (CC.FOUNDATION_CRITERIA || []).length;
  (CC.FOUNDATION_CRITERIA || []).forEach(function(c) {
    if (c.state === 'complete') complete++;
    else if (c.state === 'partial') partial++;
  });
  var bar = CC.renderProgressBar
    ? CC.renderProgressBar(complete, partial, total)
    : '';
  return CC.renderHearthTile({
    label: 'Monument',
    icon: 'monument',
    bodyText: 'Foundation \u00b7 ' + complete + ' of ' + total + ' complete'
      + (partial ? ', ' + partial + ' partial' : ''),
    meta: 'Command Center',
    extraHtml: '<span class="cc-hearth-tile-progress">' + bar + '</span>',
    route: '/plaza',
    ariaLabel: 'Monument \u2014 open the Plaza',
  });
};

CC.buildHearthTile_latestDecree = function() {
  var list = (CC.DECREES || []);
  if (list.length === 0) {
    return CC.renderHearthTile({
      label: 'Latest Decree',
      icon: 'decree',
      bodyText: 'No decrees yet.',
      meta: 'The ledger is empty',
      route: '/senate',
      ariaLabel: 'Decree ledger \u2014 open the Senate',
    });
  }
  var latest = list[0];
  return CC.renderHearthTile({
    label: 'Latest Decree',
    icon: 'decree',
    bodyText: 'Decree ' + latest.id + ' \u2014 ' + (latest.title || ''),
    meta: (latest.body || '') + ' \u00b7 Chronicled ' + CC.formatDateShort(latest.date || ''),
    route: '/senate',
    ariaLabel: 'Latest Decree \u2014 open the Senate',
    fresh: CC.isRecent(latest.date, 1),
  });
};

CC.buildHearthTile_latestCanon = function() {
  var canonsData = (CC.state.cache && CC.state.cache.canons) || null;
  if (!canonsData || !Array.isArray(canonsData.canons) || canonsData.canons.length === 0) {
    return CC.renderHearthTile({
      label: 'Latest Canon',
      icon: 'canon',
      bodyHtml: '<em>Fetching from the Library.</em>',
      meta: 'Consulted via Ostia',
      route: '/archives',
      ariaLabel: 'Latest Canon \u2014 open the Archives',
    });
  }
  var latest = null;
  var maxDate = '';
  canonsData.canons.forEach(function(c) {
    if (!c || c._deleted) return;
    var d = c.created ? String(c.created) : '';
    if (d >= maxDate) { maxDate = d; latest = c; }
  });
  if (!latest) latest = canonsData.canons[canonsData.canons.length - 1];
  var title = latest.title || latest.rule || latest.id || '(untitled)';
  var metaParts = [];
  if (latest.id) metaParts.push(latest.id);
  if (latest.created) metaParts.push('ratified ' + CC.formatDateShort(latest.created));
  return CC.renderHearthTile({
    label: 'Latest Canon',
    icon: 'canon',
    bodyText: title,
    meta: metaParts.join(' \u00b7 '),
    route: '/archives',
    ariaLabel: 'Latest Canon \u2014 open the Archives',
    fresh: CC.isRecent(latest.created, 1),
  });
};

CC.buildHearthTile_latestChronicle = function() {
  var canonsData = (CC.state.cache && CC.state.cache.canons) || null;
  if (!canonsData || !Array.isArray(canonsData.lore)) {
    return CC.renderHearthTile({
      label: 'Latest Chronicle',
      icon: 'chronicle',
      bodyHtml: '<em>Fetching from the Library.</em>',
      meta: 'Consulted via Ostia',
      route: '/archives',
      ariaLabel: 'Latest Chronicle \u2014 open the Archives',
    });
  }
  var candidates = canonsData.lore.filter(function(l) {
    return l && !l._deleted && l.title
      && (l.category === 'chronicles' || l.category === 'cautionary_tales' || l.category === 'doctrines');
  });
  if (candidates.length === 0) return null;
  var latest = null;
  var maxDate = '';
  candidates.forEach(function(l) {
    var d = l.created ? String(l.created) : (l.date ? String(l.date) : '');
    if (d >= maxDate) { maxDate = d; latest = l; }
  });
  if (!latest) return null;
  var catLabel = latest.category === 'chronicles' ? 'Chronicle'
    : latest.category === 'cautionary_tales' ? 'Cautionary Tale'
    : latest.category === 'doctrines' ? 'Doctrine'
    : 'Lore';
  var metaParts = [catLabel];
  if (latest.created) metaParts.push('chronicled ' + CC.formatDateShort(latest.created));
  return CC.renderHearthTile({
    label: 'Latest Chronicle',
    icon: 'chronicle',
    bodyText: latest.title,
    meta: metaParts.join(' \u00b7 '),
    route: '/archives',
    ariaLabel: 'Latest Chronicle \u2014 ' + latest.title + ' \u2014 open the Archives',
    fresh: CC.isRecent(latest.created, 1),
  });
};

CC.buildHearthTile_order = function() {
  var companionsData = (CC.state.cache && CC.state.cache.companions) || null;
  var drafted = 0;
  var total = (CC.GEN_ZERO_IDS || []).length;
  if (companionsData && Array.isArray(companionsData.companions)) {
    companionsData.companions.forEach(function(c) {
      if (CC.GEN_ZERO_IDS.indexOf(c.id) !== -1) drafted++;
    });
  }
  var undrafted = total - drafted;
  var body = undrafted === 0
    ? 'The Order is fully profiled.'
    : undrafted + ' of ' + total + ' Gen 0 companions await profile drafting.';
  var meta = total > 0
    ? drafted + ' of ' + total + ' profiles present in Codex'
    : 'Awaiting Ostia fetch';
  return CC.renderHearthTile({
    label: 'The Order',
    icon: 'order',
    bodyText: body,
    meta: meta,
    route: '/senate',
    ariaLabel: 'The Order \u2014 open the Senate',
  });
};

CC.buildHearthTile_scriptorium = function() {

  if (warns) parts.push(warns + ' warning' + (warns === 1 ? '' : 's'));
  return CC.renderHearthTile({

// City map — rooms as districts. Charter Art. 4: the Capital is a city.

CC.renderCityMap = function() {
  var roomById = {};
  CC.ROOMS.forEach(function(r) { roomById[r.id] = r; });

  var districtBlocks = (CC.DISTRICTS || []).map(function(d) {
    var tiles = (d.rooms || []).map(function(id) {
      var r = roomById[id];
      return r ? CC.renderRoomTileCard(r) : '';

      '<section class="cc-district" data-district="' + CC.escAttr(d.id) + '">',
      '<div class="cc-district-header">',

      d.note ? '<p class="cc-district-note">' + CC.escHtml(d.note) + '</p>' : '',
      '</div>',
      '<div class="cc-district-rooms">' + tiles + '</div>',
      '</section>',

  return '<div class="cc-city-map">' + districtBlocks + '</div>';

// Chronicle inscription strip — one line from the Republic's memory.
// Drawn from canons.json's lore[], filtered to 'chronicles' category.
// Bard's note #3: the Capital should speak without shouting.
CC.renderChronicleStrip = function() {
  var canonsData = (CC.state.cache && CC.state.cache.canons) || null;
  var inscription = null;
  var source = null;
  var sourceDate = null;
  if (canonsData && Array.isArray(canonsData.lore)) {
    var chronicles = canonsData.lore.filter(function(l) {
      return l && l.category === 'chronicles' && !l._deleted && l.title;
    });
    if (chronicles.length > 0) {
      // Pick by (today's date + day-of-year) parity for a stable daily rotation.
      // Not random; not ticker; one chronicle per day of the Capital's life.
      var now = new Date();
      var dayOfYear = Math.floor(
        (now - new Date(now.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24)
      );
      var pick = chronicles[dayOfYear % chronicles.length];
      if (pick) {
        inscription = pick.title;
        source = pick.id || '';
        sourceDate = pick.created || '';
      }
    }
  }

  if (!inscription) {
    // Graceful Dawn: before the Library responds, the Hearth speaks for itself.
    inscription = 'The Republic is not a thing, but a relation. These Provinces hold that relation for us.';
    source = 'The Capital';
    sourceDate = '';
  }

  var sourceLine = '';
  if (source) {
    var parts = [];
    parts.push(CC.escHtml(source));

// --- Scriptorium — the Capital's operational record ---
// A chronological log of the Capital's own runtime events: errors, warnings,
// informational notices. Distinct from the Archives (which reads canonical
// records from Codex via Ostia). The Scriptorium is native: UI-rendered from
// localStorage, no Ostia fetch.
CC.renderLogEntry = function(entry, idx) {
  var level = entry.level || 'info';
  var ts = entry.ts || '';
  var msgDisplay = CC.escHtml(entry.message || '(no message)');
  var contextHtml = '';
  if (entry.context) {
    var ctxStr;
    try { ctxStr = JSON.stringify(entry.context, null, 2); }
    catch (e) { ctxStr = String(entry.context); }
    contextHtml = '<pre class="cc-log-context">' + CC.escHtml(ctxStr) + '</pre>';
  }
  // Parse ISO timestamp into a local civic-style line without constructing
  // a Date from ambiguous strings (canon-0012 is about date-only strings;
  // full ISO timestamps are unambiguous and safe).
  var tsLabel = ts;
  try {
    var d = new Date(ts);
    if (!isNaN(d.getTime())) {
      var pad = function(n) { return n < 10 ? '0' + n : String(n); };
      tsLabel = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds())
        + ' \u00b7 ' + pad(d.getDate()) + ' ' + (CC.MONTH_NAMES[d.getMonth()] || '') + ' ' + d.getFullYear();
    }
  } catch (e) {}
  return [
    '<article class="cc-log-entry" data-level="' + CC.escAttr(level) + '">',
    '<div class="cc-log-entry-head">',
    '<span class="cc-log-level" data-level="' + CC.escAttr(level) + '">' + CC.escHtml(level) + '</span>',
    '<span class="cc-log-ts">' + CC.escHtml(tsLabel) + '</span>',
    '</div>',
    '<p class="cc-log-message">' + msgDisplay + '</p>',
    contextHtml,
    '</article>',
  ].join('');
};

CC.roomRenderers['scriptorium'] = function(room) {
  var entries = CC.readLog();
  var counts = { error: 0, warn: 0, info: 0 };
  entries.forEach(function(e) {
    if (counts[e.level] != null) counts[e.level]++;
  });
  var summary = [
    '<article class="cc-card">',
    '<div class="cc-card-title">The Scribe\u2019s tally</div>',
    '<dl class="cc-ledger cc-mt-12">',
    '<dt class="cc-ledger-label">Total entries</dt><dd class="cc-ledger-value">' + entries.length + ' of ' + CC.LOG_MAX + '</dd>',
    '<dt class="cc-ledger-label">Errors</dt><dd class="cc-ledger-value">' + counts.error + '</dd>',
    '<dt class="cc-ledger-label">Warnings</dt><dd class="cc-ledger-value">' + counts.warn + '</dd>',
    '<dt class="cc-ledger-label">Notices</dt><dd class="cc-ledger-value">' + counts.info + '</dd>',
    '</dl>',
    '<div class="cc-log-actions cc-mt-16">',
    '<button class="cc-pref-btn cc-pref-btn-ghost" data-action="copyLog">Copy all</button>',
    '<button class="cc-pref-btn cc-pref-btn-ghost" data-action="clearLog">Clear</button>',
    '</div>',
    '</article>',
  ].join('');

  var listHtml;
  if (entries.length === 0) {
    listHtml = [
      '<article class="cc-card">',
      '<div class="cc-card-title">Ledger</div>',
      '<p class="cc-small cc-muted">No entries. The Scribe waits. Operational events will appear here as the Capital runs.</p>',
      '</article>',
    ].join('');
  } else {
    // Most recent first.
    var rendered = entries.slice().reverse().map(CC.renderLogEntry).join('');
    listHtml = [
      '<article class="cc-card cc-log-list-card">',
      '<div class="cc-card-title">Ledger \u2014 most recent first</div>',
      '<div class="cc-log-list cc-mt-12">' + rendered + '</div>',
      '</article>',
    ].join('');
  }

  return [
    '<section class="cc-room">',
    CC.renderRoomHeader(room),
    summary,
    listHtml,
    CC.renderFoundationBanner('The Scriptorium is native to the Capital. It holds runtime memory only; canonical chronicling remains with Codex.'),
    '</section>',
  ].join('');
};

// Progress bar is SVG (canon-0002 compliant: SVG geometry attributes aren't
// inline CSS styles). Green fill = complete criteria; amber fill = partial.
// The remainder is the unfilled track. Numbers drawn from FOUNDATION_CRITERIA.
CC.renderProgressBar = function(complete, partial, total) {
  var pctComplete = total ? (complete / total) * 100 : 0;
  var pctPartial  = total ? (partial  / total) * 100 : 0;
  var pctCompleteStr = pctComplete.toFixed(2);
  var pctPartialStr  = pctPartial.toFixed(2);
  return [
    '<svg class="cc-progress-bar" viewBox="0 0 100 6" preserveAspectRatio="none"',
    ' role="progressbar" aria-valuemin="0"',
    ' aria-valuemax="' + CC.escAttr(String(total)) + '"',
    ' aria-valuenow="' + CC.escAttr(String(complete)) + '"',
    ' aria-label="Foundation progress: ' + CC.escAttr(complete + ' of ' + total + ' complete') + '">',
    '<rect x="0" y="0" width="100" height="6" rx="3" class="cc-progress-track"/>',
    complete ? '<rect x="0" y="0" width="' + pctCompleteStr + '" height="6" class="cc-progress-fill-complete"/>' : '',
    partial  ? '<rect x="' + pctCompleteStr + '" y="0" width="' + pctPartialStr + '" height="6" class="cc-progress-fill-partial"/>' : '',
    '</svg>',
  ].join('');
};

/* Command Center — ostia.js
   Codex integration. The Capital's link to the Library (Ostia).
   Foundation Stage v0.1 \u2014 fetcher + snippet exporter stubs.

   Two responsibilities:
     1. Read path  \u2014 fetch canonical records from Codex and render in the Capital.
     2. Write path \u2014 produce Aurelius-format snippets for Codex's import pipeline.

   Builder note (Ashara, Petra): the runtime-fetch vs build-time-bake decision
   is open. Stubs below implement runtime fetch with localStorage cache fallback,
   but both strategies are valid. See ARCHITECTURE.md section 3.1. */

CC.ostia = {};

// --- Cache ---
CC.ostia.CACHE_KEY_PREFIX = 'cc-codex-cache-';
CC.ostia.CACHE_TTL_MS = 15 * 60 * 1000; // 15 minutes; revisit at Roads stage

CC.ostia.readCache = function(fileKey) {
  try {
    const raw = localStorage.getItem(CC.ostia.CACHE_KEY_PREFIX + fileKey);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed._fetched_at) return null;
    if (Date.now() - parsed._fetched_at > CC.ostia.CACHE_TTL_MS) return null;
    return parsed.data;
  } catch (e) { return null; }
};

CC.ostia.writeCache = function(fileKey, data) {
  try {
    localStorage.setItem(CC.ostia.CACHE_KEY_PREFIX + fileKey, JSON.stringify({
      _fetched_at: Date.now(),
      data: data,
    }));
  } catch (e) {
    // Storage failure is non-fatal \u2014 Capital still renders, just refetches next time
    console.warn('CC.ostia: cache write failed', e);
  }
};

// --- Fetch ---
CC.ostia.fetch = function(fileKey) {
  // fileKey: 'companions' | 'canons' | 'journal' | 'lore' | 'constitution'
  const filename = CC.CODEX.files[fileKey];
  if (!filename) {
    var err = new Error('CC.ostia.fetch: unknown fileKey ' + fileKey);
    if (CC.log) CC.log('error', err.message, { fileKey: fileKey });
    return Promise.reject(err);
  }

  // Check cache first
  const cached = CC.ostia.readCache(fileKey);
  if (cached) {
    CC.state.cache[fileKey] = cached;
    if (CC.log) CC.log('info', 'Ostia cache hit: ' + fileKey, { file: filename });
    return Promise.resolve(cached);
  }

  const url = CC.CODEX.base_raw + filename;
  return fetch(url, { cache: 'no-cache' })
    .then(function(resp) {
      if (!resp.ok) throw new Error('Ostia fetch failed: ' + resp.status + ' for ' + filename);
      return resp.json();
    })
    .then(function(data) {
      CC.state.cache[fileKey] = data;
      CC.ostia.writeCache(fileKey, data);
      if (CC.log) {
        var counts = {};
        if (data && Array.isArray(data.canons)) counts.canons = data.canons.length;
        if (data && Array.isArray(data.companions)) counts.companions = data.companions.length;
        if (data && Array.isArray(data.lore)) counts.lore = data.lore.length;
        CC.log('info', 'Ostia fetched: ' + fileKey, { file: filename, counts: counts });
      }
      return data;
    })
    .catch(function(err) {
      if (CC.log) CC.log('error', 'Ostia fetch failed: ' + fileKey, {
        file: filename,
        url: url,
        message: err && err.message,
      });
      throw err;
    });
};

// --- Render hook: once companions.json is cached, refresh resident cards ---
CC.ostia.onCompanionsFetched = function() {
  // If the current room shows a resident list, re-render to pick up real profiles
  if (!CC.state.current_room) return;
  const room = CC.ROOMS.find(function(r) { return r.id === CC.state.current_room; });
  if (room) CC.renderRoom(room);
};

// --- Render hook: once canons.json is cached, refresh the Civic Hearth ---
// The Hearth shows a latest-canon card and a chronicle inscription, both drawn
// from canons.json (canons[] + lore[]). When the fetch lands, re-render if
// we're still on the home room so the presence becomes visible.
CC.ostia.onCanonsFetched = function() {
  if (CC.state.current_room !== 'home') return;
  const room = CC.ROOMS.find(function(r) { return r.id === 'home'; });
  if (room) CC.renderRoom(room);
};

// --- Canons rendering helper (used by Archives room) ---
CC.ostia.renderCanonsInto = function(el) {
  if (!el) return;
  el.textContent = 'Fetching from Codex...';
  CC.ostia.fetch('canons')
    .then(function(data) {
      if (!data || !Array.isArray(data.canons)) {
        el.innerHTML = '<em>Canons file received but shape unexpected. Ashara + Petra to inspect at Capital Occupancy.</em>';
        return;
      }
      const count = data.canons.length;
      const recent = data.canons.slice(-5).reverse();
      const lines = recent.map(function(c) {
        const id = CC.escHtml(c.id || '?');
        const title = CC.escHtml(c.title || c.rule || '(untitled)');
        return '<li><strong>' + id + '</strong> \u2014 ' + title + '</li>';
      }).join('');
      el.innerHTML = [
        '<p>' + count + ' canons in the Library.</p>',
        '<p class="cc-small cc-muted">Most recent:</p>',
        '<ul class="cc-small">' + lines + '</ul>',
      ].join('');
    })
    .catch(function(err) {
      el.innerHTML = '<em>Could not reach Codex. ' + CC.escHtml(err.message || 'Unknown error') + '</em>';
    });
};

// --- Snippet export (write path, placeholder) ---
// Builders will develop this at Capital Occupancy stage. Shape mirrors the
// Aurelius snippet format used by Codex's existing pipeline.
CC.ostia.buildSnippet = function(operations) {
  // operations: array of { type: 'new_canons'|'new_chapters'|'update_companions'|..., payload: {...} }
  return {
    _schema: 'aurelius-snippet-v1',
    _source: 'command-center',
    _authored: new Date().toISOString(),
    operations: operations || [],
  };
};

CC.ostia.exportSnippet = function(snippet) {
  // Foundation stage: download as JSON for manual import to Codex.
  // Future: transmit via agent surface or GitHub API.
  const blob = new Blob([JSON.stringify(snippet, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cc-snippet-' + Date.now() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  CC.toast('Snippet exported. Import to Codex via the snippet pipeline.');
};

// --- Auto-fetch at startup (non-blocking) ---
// Warm both companions and canons so the Civic Hearth and resident cards
// both have their records when the Overview renders. Independent promises;
// a failure in one does not block the other.
CC.ostia.warmStart = function() {
  CC.ostia.fetch('companions')
    .then(function() { CC.ostia.onCompanionsFetched(); })
    .catch(function(err) {
      console.warn('CC.ostia: initial companions fetch failed \u2014 Capital renders from residence data only', err.message);
    });
  CC.ostia.fetch('canons')
    .then(function() { CC.ostia.onCanonsFetched(); })
    .catch(function(err) {
      console.warn('CC.ostia: initial canons fetch failed \u2014 Hearth renders with Dawn fallback', err.message);
    });
};

/* Command Center — start.js
   Boot sequence. Wire event delegation. Initial render.
   Foundation Stage v0.1 */

(function() {
  'use strict';

  function boot() {
    // Operational log capture — the Scriptorium records these. Registered
    // before anything else so boot-time errors are also caught.
    if (CC.log) {
      window.addEventListener('error', function(ev) {
        CC.log('error', ev.message || 'Uncaught error', {
          source: ev.filename,
          line: ev.lineno,
          col: ev.colno,
          stack: ev.error && ev.error.stack,
        });
      });
      window.addEventListener('unhandledrejection', function(ev) {
        var reason = ev.reason;
        var msg = 'Unhandled promise rejection';
        var ctx = {};
        if (reason instanceof Error) {
          msg += ': ' + (reason.message || reason.name || '');
          ctx.stack = reason.stack;
          ctx.name = reason.name;
        } else if (reason != null) {
          try { msg += ': ' + String(reason); } catch (e) {}
        }
        CC.log('error', msg, ctx);
      });
      CC.log('info', 'Capital booted', { version: CC.VERSION, built: CC.BUILT });
    }

    // Event delegation (Hard Rule 3)
    document.body.addEventListener('click', CC.handleClick, false);

    // Hash routing
    window.addEventListener('hashchange', CC.onRouteChange, false);

    // Version label
    const vlabel = CC.$('#ccVersionLabel');
    if (vlabel) vlabel.textContent = CC.VERSION;

    // Built-date label (civic signature footer)
    const bLabel = CC.$('#ccBuiltLabel');
    if (bLabel && CC.BUILT) {
      bLabel.textContent = 'built ' + (CC.formatDateShort ? CC.formatDateShort(CC.BUILT) : CC.BUILT);
    }

    // Backdrop closes overlay
    const backdrop = CC.$('#overlayBackdrop');
    if (backdrop) backdrop.addEventListener('click', CC.closeOverlay, false);

    // Kick off Codex fetch (non-blocking)
    if (CC.ostia && CC.ostia.warmStart) {
      CC.ostia.warmStart();
    }

    // Initial route
    CC.onRouteChange();

    // If we're on the Archives, hook the canons panel
    setTimeout(function() {
      const canonsPanel = CC.$('#archivesCanonsBody');
      if (canonsPanel) {
        CC.ostia.renderCanonsInto(canonsPanel);
      }
    }, 0);
  }

  // Re-hook archives panel after navigation (since rendering replaces the DOM)
  const origRender = CC.renderRoom;
  CC.renderRoom = function(room) {
    origRender(room);
    if (room && room.id === 'archives') {
      const canonsPanel = CC.$('#archivesCanonsBody');
      if (canonsPanel) {
        CC.ostia.renderCanonsInto(canonsPanel);
      }
    }
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot, false);
  } else {
    boot();
  }
})();
</script>
